<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligent Returns — Decision Tree</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #555;
    --color-text-tertiary: #888;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f5;
    --color-border-primary: #ccc;
    --color-border-secondary: #ddd;
    --color-border-tertiary: #e5e5e5;
    --border-radius-lg: 10px;
    --border-radius-md: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: #fafafa; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 17px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 1.5rem; }
  .tree { padding: 1rem 0 2rem; }
  .progress { display: flex; gap: 4px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .crumb { font-size: 11px; color: var(--color-text-tertiary); cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .crumb:hover { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .crumb.active { color: var(--color-text-primary); font-weight: 500; cursor: default; }
  .crumb.active:hover { background: transparent; }
  .crumb-sep { color: var(--color-text-tertiary); font-size: 10px; }
  .question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .q-stage { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .q-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .q-text { font-size: 15px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
  .q-note { margin-top: 8px; font-size: 12px; color: var(--color-text-secondary); font-style: italic; line-height: 1.4; padding: 6px 10px; background: var(--color-background-secondary); border-left: 2px solid var(--color-border-secondary); }
  .options { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
  .opt-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; text-align: left; cursor: pointer; font-size: 13px; color: var(--color-text-primary); line-height: 1.4; transition: background 0.1s, border-color 0.1s; display: flex; align-items: flex-start; gap: 8px; }
  .opt-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .opt-tag { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 20px; border-radius: 4px; font-size: 10px; font-weight: 500; flex-shrink: 0; padding: 0 5px; margin-top: 1px; }
  .tag-yes { background: #EAF3DE; color: #27500A; }
  .tag-no { background: #FCEBEB; color: #791F1F; }
  .tag-a { background: #E6F1FB; color: #0C447C; }
  .tag-b { background: #EEEDFE; color: #3C3489; }
  .tag-c { background: #E1F5EE; color: #085041; }
  .tag-d { background: #FAEEDA; color: #633806; }
  .tag-e { background: #FAECE7; color: #712B13; }
  .outcome { border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; border: 0.5px solid; }
  .outcome.insights { background: #E6F1FB; border-color: #85B7EB; }
  .outcome.instant { background: #EAF3DE; border-color: #97C459; }
  .outcome.appeasements { background: #EEEDFE; border-color: #AFA9EC; }
  .outcome.blocker { background: #FCEBEB; border-color: #F09595; }
  .outcome.pov { background: #FAEEDA; border-color: #EF9F27; }
  .outcome.disqualified { background: #F1EFE8; border-color: #B4B2A9; }
  .outcome-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .outcome.insights .outcome-label { color: #0C447C; }
  .outcome.instant .outcome-label { color: #3B6D11; }
  .outcome.appeasements .outcome-label { color: #3C3489; }
  .outcome.blocker .outcome-label { color: #791F1F; }
  .outcome.pov .outcome-label { color: #633806; }
  .outcome.disqualified .outcome-label { color: #5F5E5A; }
  .outcome-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; line-height: 1.3; }
  .outcome.insights .outcome-title { color: #042C53; }
  .outcome.instant .outcome-title { color: #173404; }
  .outcome.appeasements .outcome-title { color: #26215C; }
  .outcome.blocker .outcome-title { color: #501313; }
  .outcome.pov .outcome-title { color: #412402; }
  .outcome.disqualified .outcome-title { color: #2C2C2A; }
  .outcome-body { font-size: 12.5px; line-height: 1.6; }
  .outcome.insights .outcome-body { color: #185FA5; }
  .outcome.instant .outcome-body { color: #27500A; }
  .outcome.appeasements .outcome-body { color: #534AB7; }
  .outcome.blocker .outcome-body { color: #A32D2D; }
  .outcome.pov .outcome-body { color: #854F0B; }
  .outcome.disqualified .outcome-body { color: #444441; }
  .owner-row { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .owner-chip { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; background: rgba(0,0,0,0.06); color: var(--color-text-secondary); }
  .placeholder-note { margin-top: 10px; font-size: 11px; padding: 5px 8px; border-radius: var(--border-radius-md); background: rgba(186,117,23,0.1); color: #633806; font-style: italic; }
  .actions { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
  .btn-back { font-size: 12px; color: var(--color-text-secondary); background: transparent; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 12px; cursor: pointer; }
  .btn-back:hover { background: var(--color-background-secondary); }
  .btn-restart { font-size: 12px; color: var(--color-text-secondary); background: transparent; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 12px; cursor: pointer; }
  .btn-restart:hover { background: var(--color-background-secondary); }
  .qual-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .qual-item { font-size: 11px; padding: 3px 10px; border-radius: 10px; border: 0.5px solid; }
  .qual-pass { background: #EAF3DE; border-color: #97C459; color: #27500A; }
  .qual-fail { background: #FCEBEB; border-color: #F09595; color: #791F1F; }
  .qual-pending { background: var(--color-background-secondary); border-color: var(--color-border-tertiary); color: var(--color-text-tertiary); }
</style>
</head>
<body>
<div class="container">
  <h1>Intelligent Returns — Qualification & Routing</h1>
  <div class="tree">
    <div class="progress" id="progress"></div>
    <div class="qual-bar" id="qual-bar"></div>
    <div id="content"></div>
  </div>
</div>
<script>
const nodes = {
  start: {
    id: "start", label: "Starting point", stage: "Context",
    q: "Is this a new merchant or an existing one?",
    opts: [
      { tag: "a", label: "New merchant — not yet on Signifyd", next: "new_prereq_order" },
      { tag: "b", label: "Existing merchant — already on Signifyd", next: "existing_state" }
    ]
  },
  new_prereq_order: {
    id: "new_prereq_order", label: "Technical prerequisite", stage: "Eligibility check",
    q: "Does this merchant have a Checkout API or Sale API integration?",
    note: "Hard requirement — Returns APIs return a 404 without an existing order in Signifyd's system.",
    opts: [
      { tag: "yes", label: "Yes — Checkout or Sale API is live", next: "new_prereq_fulfillment" },
      { tag: "no", label: "No — returns would be their first Signifyd product", next: "blocker_no_order" }
    ]
  },
  blocker_no_order: {
    type: "outcome", style: "blocker",
    title: "Blocked — order integration required first",
    body: "Returns APIs require an existing order in Signifyd's system. Scope Checkout API (pre-auth) or Sale API (post-auth) as the first integration, then return to this tree. Returns cannot be sold or delivered as a standalone first product.",
    owners: ["AE owns deal framing", "SE owns technical scoping"]
  },
  new_prereq_fulfillment: {
    id: "new_prereq_fulfillment", label: "Technical prerequisite", stage: "Eligibility check",
    q: "Is the Fulfillment API integrated?",
    note: "Required for Returns integration — provides shipment context needed by the model.",
    opts: [
      { tag: "yes", label: "Yes", next: "new_pain_point" },
      { tag: "no", label: "No", next: "blocker_fulfillment" }
    ]
  },
  blocker_fulfillment: {
    type: "outcome", style: "blocker",
    title: "Blocked — Fulfillment API required",
    body: "Fulfillment API must be live before Returns onboarding begins. Add it to the IM's integration scope alongside Returns. Once live, re-evaluate product fit.",
    owners: ["IM owns integration scope", "SE flags in SDD"]
  },
  new_pain_point: {
    id: "new_pain_point", label: "Product fit", stage: "Discovery",
    q: "What is the merchant's primary pain point with returns?",
    opts: [
      { tag: "a", label: "Return fraud or abuse — empty boxes, wrong items, serial returners, wardrobing", next: "new_volume_check" },
      { tag: "b", label: "Refund speed — refund good customers faster without more risk", next: "new_ir_size_check" },
      { tag: "c", label: "Appeasement abuse — false claims of lost/damaged items for store credit", next: "new_appeasements_check" },
      { tag: "d", label: "Visibility and analytics — understand returns data and patterns better", next: "new_volume_check_insights" }
    ]
  },
  new_volume_check_insights: {
    id: "new_volume_check_insights", label: "Qualification", stage: "Sizing",
    q: "How many return requests does the merchant process per month?",
    note: "Minimum volume is needed for the model to generate meaningful signal and for the dashboard to be useful.",
    opts: [
      { tag: "yes", label: "200+ returns per month", next: "recommend_insights" },
      { tag: "no", label: "Fewer than 200 returns per month", next: "disqualified_low_volume" }
    ]
  },
  new_volume_check: {
    id: "new_volume_check", label: "Qualification", stage: "Sizing",
    q: "How many return requests does the merchant process per month?",
    note: "Model accuracy improves significantly with volume. Returns Insights is viable at lower volumes than Instant Refunds.",
    opts: [
      { tag: "a", label: "500+ returns per month", next: "new_fraud_outcomes" },
      { tag: "b", label: "200–499 returns per month", next: "recommend_insights_low_vol" },
      { tag: "no", label: "Fewer than 200 returns per month", next: "disqualified_low_volume" }
    ]
  },
  disqualified_low_volume: {
    type: "outcome", style: "disqualified",
    title: "Not qualified — insufficient return volume",
    body: "With fewer than 200 returns per month, there is not enough data for the model to generate meaningful decisions or for the Returns Insights dashboard to surface useful patterns. This merchant is not a fit for Intelligent Returns at this time. Revisit when volume grows or if they have a concentrated high-value fraud problem worth investigating manually.",
    owners: ["AE notes in Salesforce as future pipeline", "CSM monitors for volume growth if existing merchant"],
    placeholder: "Threshold to validate: confirm 200/mo minimum with Pedro or the pricing doc"
  },
  recommend_insights_low_vol: {
    type: "outcome", style: "insights",
    title: "Returns Insights — viable at this volume, Instant Refunds not yet",
    body: "Volume is sufficient for Returns Insights to surface patterns and begin building model signal, but not enough for Instant Refunds to make high-confidence real-time decisions at scale. Start with ideal-state Returns Insights integration. Revisit Instant Refunds when monthly return volume crosses 500+. Frame this to the merchant as a phased approach: insights now, decisions when the data set is richer.",
    owners: ["SE owns POV design and SDD", "AE owns commercial framing", "CSM owns monitoring and upsell timing"],
    placeholder: "Threshold to validate: confirm 500/mo as IR minimum with DS"
  },
  new_fraud_outcomes: {
    id: "new_fraud_outcomes", label: "POV feasibility", stage: "Discovery",
    q: "Can the merchant provide labeled outcome data — which returns were actually fraudulent or abusive?",
    note: "Without labels, you can score returns but can't prove model performance. This is the most common POV blocker.",
    opts: [
      { tag: "yes", label: "Yes — they track outcomes (e.g. Loop API, WMS data, CSV from warehouse)", next: "recommend_insights_to_ir" },
      { tag: "no", label: "No — they don't have labeled fraud outcome data yet", next: "recommend_insights_no_outcomes" }
    ]
  },
  recommend_insights_to_ir: {
    type: "outcome", style: "insights",
    title: "Returns Insights (ideal state) — strong path to Instant Refunds",
    body: "Merchant has volume and outcome data. Start with Returns Insights at ideal-state integration (Create + Update + Feedback, infoOnly: INFO_ONLY). Once the AR/LR curve proves model accuracy, Product/DS sets thresholds and the flip to Instant Refunds is just changing infoOnly to EVALUATE — minimal additional technical work.",
    owners: ["SE owns POV design + SDD", "AE owns commercial framing", "Product owns threshold setting before IR go-live"]
  },
  recommend_insights_no_outcomes: {
    type: "outcome", style: "insights",
    title: "Returns Insights — offline POV, build toward outcomes",
    body: "Without labeled outcomes, run an offline POV: merchant sends historical return data via flat file, Signifyd scores it, and merchant validates the high-risk flags against their own knowledge. Define what 'fraud' means for this merchant first. Build getting outcomes flowing automatically (Loop API or CSV) into the POV scope.",
    owners: ["SE owns POV design + ATC submission", "AE owns commercial framing", "Product supports POV evaluation"]
  },
  new_ir_size_check: {
    id: "new_ir_size_check", label: "Qualification — Instant Refunds", stage: "Sizing",
    q: "How many return requests does the merchant process per month?",
    note: "Instant Refunds requires enough volume for the model to make confident decisions. Below threshold, false positive risk is too high to justify live decisions.",
    opts: [
      { tag: "yes", label: "500+ returns per month", next: "new_ir_gmv_check" },
      { tag: "no", label: "Fewer than 500 returns per month", next: "ir_volume_too_low" }
    ]
  },
  ir_volume_too_low: {
    type: "outcome", style: "pov",
    title: "Too early for Instant Refunds — start with Returns Insights",
    body: "Instant Refunds requires sufficient volume for the model to make high-confidence real-time decisions. At fewer than 500 returns/month, false positive risk is too high and the ROI story is harder to justify. Start with Returns Insights to build model signal and prove value. Set a specific trigger: 'when you hit 500 returns/month, we revisit Instant Refunds together.'",
    owners: ["SE owns Returns Insights POV scoping", "CSM owns the Instant Refunds upsell trigger conversation"],
    placeholder: "Threshold to validate: confirm 500/mo minimum with DS"
  },
  new_ir_gmv_check: {
    id: "new_ir_gmv_check", label: "Qualification — Instant Refunds", stage: "Sizing",
    q: "What is the merchant's estimated annual returns GMV (total value of returns processed per year)?",
    note: "Instant Refunds requires Product/DS investment in threshold setting and ongoing model monitoring. The deal size needs to justify that resource commitment.",
    opts: [
      { tag: "yes", label: "$2M+ in annual returns GMV", next: "new_ir_fraud_signal" },
      { tag: "no", label: "Under $2M in annual returns GMV", next: "ir_gmv_too_low" }
    ]
  },
  ir_gmv_too_low: {
    type: "outcome", style: "pov",
    title: "Below Instant Refunds GMV threshold — Returns Insights is the fit",
    body: "Below $2M in annual returns GMV, the economics don't justify the Product/DS investment in threshold setting and ongoing monitoring. Returns Insights is the right product at this size. Revisit Instant Refunds if the merchant's returns volume grows.",
    owners: ["AE frames around Returns Insights value", "SE scopes Returns Insights integration"],
    placeholder: "Threshold to validate: confirm $2M GMV minimum with pricing doc and Pedro"
  },
  new_ir_fraud_signal: {
    id: "new_ir_fraud_signal", label: "Qualification — Instant Refunds", stage: "Discovery",
    q: "Does the merchant believe they have a meaningful return fraud or abuse problem?",
    note: "Without fraud signal, there's no ROI story. A merchant with near-zero fraud has no case for the investment.",
    opts: [
      { tag: "yes", label: "Yes — they suspect or have evidence of return fraud/abuse", next: "new_instant_readiness" },
      { tag: "no", label: "No — they believe their return fraud rate is very low", next: "ir_no_fraud_signal" }
    ]
  },
  ir_no_fraud_signal: {
    type: "outcome", style: "insights",
    title: "Returns Insights first — validate whether fraud exists",
    body: "Without fraud signal, the Instant Refunds ROI story doesn't land. Use Returns Insights to first validate whether fraud is actually occurring — merchants are often surprised by what the model surfaces. If Insights reveals meaningful fraud patterns, that becomes the evidence base to upsell to Instant Refunds.",
    owners: ["SE owns Returns Insights POV framing", "CSM owns the upsell conversation post-Insights"]
  },
  new_instant_readiness: {
    id: "new_instant_readiness", label: "Technical readiness", stage: "Instant Refunds fit",
    q: "Can the merchant's system act on a real-time decision at the moment of the return request?",
    note: "Instant Refunds requires the merchant to programmatically accept, hold, or reject a refund based on Signifyd's live checkpointAction response.",
    opts: [
      { tag: "yes", label: "Yes — their return portal can receive and act on a decision in real time", next: "new_instant_portal" },
      { tag: "no", label: "No — returns always route to CS, no programmatic flow exists", next: "recommend_insights_first" }
    ]
  },
  recommend_insights_first: {
    type: "outcome", style: "insights",
    title: "Returns Insights first — merchant not operationally ready for Instant Refunds",
    body: "Merchant has the size and fraud signal, but their operational flow is too manual to act on real-time decisions. Start with Returns Insights. Use the insights phase to help the merchant build toward a programmatic decision workflow. Set a specific milestone: 'once you have a return portal that can act on a decision, we flip the switch.'",
    owners: ["SE owns Returns Insights POV", "CSM owns Instant Refunds milestone conversation"]
  },
  new_instant_portal: {
    id: "new_instant_portal", label: "Integration approach", stage: "Instant Refunds fit",
    q: "What return portal or system does the merchant use?",
    opts: [
      { tag: "a", label: "Shopify + Loop (or another Shopify return app)", next: "recommend_instant_shopify" },
      { tag: "b", label: "Custom API / non-Shopify platform", next: "recommend_instant_api" },
      { tag: "c", label: "Not sure / still evaluating a return portal", next: "ir_no_portal" }
    ]
  },
  ir_no_portal: {
    type: "outcome", style: "pov",
    title: "Pause — return portal decision needed first",
    body: "Instant Refunds requires a return portal that can receive and act on Signifyd's decision. Without a portal in place, the integration can't be scoped. Help the merchant evaluate portal options — Loop is the most common for Shopify merchants. Once they've selected a portal, return to this tree to scope the integration approach.",
    owners: ["SE documents in SDD as a blocker", "AE notes dependency in Salesforce"]
  },
  recommend_instant_shopify: {
    type: "outcome", style: "instant",
    title: "Instant Refunds — Shopify + Loop via Shopify Flow",
    body: "Use Shopify Flow (no-code) to wait for Signifyd's risk tag on the return, then call Loop's API to flag high-risk returns for manual processing while issuing instant refunds for low-risk ones. No custom code, no ongoing maintenance. Figs is the reference merchant. Product/DS must set thresholds and get merchant sign-off before flipping infoOnly to EVALUATE.",
    owners: ["SE owns SDD + disposition handling guide", "IM owns integration", "Product owns threshold setting — hard gate before go-live"]
  },
  recommend_instant_api: {
    type: "outcome", style: "instant",
    title: "Instant Refunds — full API integration",
    body: "Scope the full three-endpoint integration (CreatePostSaleRequestedAction, UpdatePostSaleAction, SubmitPostSaleActionFeedback) with infoOnly: EVALUATE. Define what ACCEPT/REJECT/HOLD means operationally for each return type before go-live. Product/DS produces an AR/LR threshold table — merchant must sign off on expected rejection rates. Note: REJECT means 'hold refund until warehouse verifies,' not 'deny customer permanently.'",
    owners: ["SE owns SDD + disposition handling guide", "IM owns API integration", "Product owns threshold setting — hard gate before go-live"]
  },
  new_appeasements_check: {
    id: "new_appeasements_check", label: "Qualification — Selective Appeasements", stage: "Sizing",
    q: "Does the merchant process 200+ appeasements per month AND have labeled outcome data on which were fraudulent?",
    note: "Appeasements training data is sparse — volume and labeled outcomes are both required. The appeasements V1 model is still in development as of early 2026.",
    opts: [
      { tag: "yes", label: "Yes — 200+ appeasements/month with labeled outcome data", next: "recommend_appeasements" },
      { tag: "no", label: "No — under 200/month or no labeled outcome data", next: "appeasements_not_ready" }
    ]
  },
  recommend_appeasements: {
    type: "outcome", style: "appeasements",
    title: "Selective Appeasements — proceed to POV scoping",
    body: "Merchant has the volume and data needed. Scope an offline POV: send historical appeasement data (ITEM_NOT_RECEIVED, LOST, ITEM_DAMAGED reason codes) with outcome labels. Validate AUC before going live. Thresholds should be more conservative than returns — a false positive here is high-stakes. HOLD for manual review is especially important. Lenovo is the reference merchant.",
    owners: ["SE owns POV design + ATC submission", "Product supports evaluation and owns threshold setting", "AE owns deal framing"]
  },
  appeasements_not_ready: {
    type: "outcome", style: "disqualified",
    title: "Not ready for Selective Appeasements",
    body: "Without 200+ monthly appeasements and labeled outcome data, it's not possible to train or validate a model for this merchant. Help the merchant build a process to track outcomes. Returns Insights can capture appeasement events in the meantime. Revisit Selective Appeasements once the data foundation exists.",
    owners: ["SE notes in SDD as future scope", "CSM tracks as expansion opportunity at renewal"],
    placeholder: "Volume threshold to validate with DS — 200/mo is a directional minimum"
  },
  existing_state: {
    id: "existing_state", label: "Current state", stage: "Context",
    q: "Is this merchant already using any Intelligent Returns product?",
    opts: [
      { tag: "a", label: "No — returns is net new for them", next: "new_prereq_order" },
      { tag: "b", label: "Yes — on Returns Insights, considering Instant Refunds", next: "existing_insights_tier" },
      { tag: "c", label: "Yes — on Instant Refunds, considering Selective Appeasements", next: "existing_ir_to_appeasements" },
      { tag: "d", label: "Yes — renewal coming up", next: "existing_renewal" }
    ]
  },
  existing_insights_tier: {
    id: "existing_insights_tier", label: "Integration tier check", stage: "Upsell readiness",
    q: "What integration tier is the merchant on?",
    opts: [
      { tag: "a", label: "Ideal state — Create + Update + Feedback all integrated", next: "existing_ir_size_check" },
      { tag: "b", label: "2nd best or MVP tier — missing some endpoints", next: "existing_upgrade_first" }
    ]
  },
  existing_upgrade_first: {
    type: "outcome", style: "pov",
    title: "Upgrade integration tier before Instant Refunds",
    body: "Merchant must reach ideal-state integration before Instant Refunds is possible. IM scopes the upgrade (adding missing endpoints). Once upgraded, re-enter this flow. CSM frames the upgrade as a short project with a clear payoff: full ideal-state integration makes the flip to Instant Refunds essentially free.",
    owners: ["IM owns integration upgrade", "CSM owns merchant conversation", "Product plans threshold setting for after upgrade"]
  },
  existing_ir_size_check: {
    id: "existing_ir_size_check", label: "Qualification — Instant Refunds", stage: "Sizing",
    q: "Does the merchant meet both Instant Refunds thresholds?",
    note: "500+ returns/month AND $2M+ annual returns GMV required even for existing merchants on ideal-state integration.",
    opts: [
      { tag: "yes", label: "Yes — 500+ returns/month AND $2M+ annual returns GMV", next: "existing_ir_fraud_check" },
      { tag: "no", label: "No — below one or both thresholds", next: "ir_volume_too_low" }
    ]
  },
  existing_ir_fraud_check: {
    id: "existing_ir_fraud_check", label: "Qualification — Instant Refunds", stage: "Discovery",
    q: "Has the Returns Insights phase surfaced meaningful fraud or abuse patterns?",
    note: "Insights phase performance data is the strongest possible evidence for the Instant Refunds upsell — use it.",
    opts: [
      { tag: "yes", label: "Yes — dashboard shows fraud patterns or merchant has flagged abuse", next: "existing_ir_ready" },
      { tag: "no", label: "No — fraud rate appears very low from Insights data", next: "ir_no_fraud_signal" }
    ]
  },
  existing_ir_ready: {
    type: "outcome", style: "instant",
    title: "Instant Refunds upsell — minimal lift, strong evidence",
    body: "Merchant is on ideal-state integration and has fraud signal from the Insights phase. The technical lift is just flipping infoOnly from INFO_ONLY to EVALUATE. CSM leads with the specific fraud value already proven during Insights. Product/DS sets final thresholds and gets merchant sign-off. This is the cleanest upsell motion in the portfolio.",
    owners: ["CSM owns upsell conversation", "SE confirms technical readiness", "Product owns threshold setting — required before go-live"]
  },
  existing_ir_to_appeasements: {
    id: "existing_ir_to_appeasements", label: "Selective Appeasements feasibility", stage: "Discovery",
    q: "Does the merchant track and can they share labeled appeasement outcome data?",
    opts: [
      { tag: "yes", label: "Yes — labeled data exists on fraudulent appeasements", next: "recommend_appeasements" },

    ]
  },
  existing_renewal: {
    id: "existing_renewal", label: "Renewal check", stage: "Renewal",
    q: "What is the merchant's current integration tier?",
    opts: [
      { tag: "a", label: "Ideal state — Create + Update + Feedback", next: "renewal_ideal" },
      { tag: "b", label: "2nd best or MVP tier", next: "renewal_upgrade" }
    ]
  },
  renewal_ideal: {
    type: "outcome", style: "insights",
    title: "Renewal — strong position",
    body: "Merchant is on ideal-state integration. Renewal prep: compile AR, fraud rate by decision bucket, blocked fraud value, and refund speed improvement. Product provides model version updates and roadmap context. If still on Returns Insights only and now meeting the volume/GMV thresholds, renewal is the natural trigger for the Instant Refunds upsell conversation.",
    owners: ["CSM leads renewal prep", "AE owns commercial negotiation", "Product provides model updates + roadmap context"]
  },
  renewal_upgrade: {
    type: "outcome", style: "pov",
    title: "Renewal — use as forcing function to upgrade tier",
    body: "A merchant below ideal-state is getting minimal value and is churn risk. Renewal is the moment to negotiate the upgrade as a contract condition. IM scopes the technical work. CSM frames: 'upgrading your integration unlocks the full value you're paying for.' First check — MVP tier (RecordPostSaleAction only) requires more significant upgrade work.",
    owners: ["AE frames upgrade in contract terms", "CSM owns merchant conversation", "IM scopes integration upgrade"]
  },
  recommend_insights: {
    type: "outcome", style: "insights",
    title: "Returns Insights — analytics and risk visibility",
    body: "Good fit for a merchant seeking to understand their returns landscape. Start with ideal-state integration (Create + Update + Feedback, infoOnly: INFO_ONLY). Provision the Returns Insights dashboard at go-live. Focus the value story on surfacing patterns they couldn't see before. Foundation for a future Instant Refunds upsell.",
    owners: ["SE owns POV design + SDD", "IM owns integration", "CSM owns post-live monitoring and upsell path"]
  }
};
let history = [], current = "start";
const qualStatus = {};
function renderQualBar() {
  const checks = [
    { key: "order_api", label: "Order API" },
    { key: "fulfillment_api", label: "Fulfillment API" },
    { key: "volume", label: "Volume" },
    { key: "gmv", label: "Returns GMV" },
    { key: "fraud_signal", label: "Fraud signal" },
    { key: "portal", label: "Return portal" }
  ];
  const bar = document.getElementById("qual-bar");
  const visible = checks.filter(c => qualStatus[c.key] !== undefined);
  if (!visible.length) { bar.innerHTML = ""; return; }
  bar.innerHTML = visible.map(c => {
    const s = qualStatus[c.key];
    const cls = s === true ? "qual-pass" : s === false ? "qual-fail" : "qual-pending";
    const icon = s === true ? "&#10003; " : s === false ? "&#10007; " : "";
    return `<span class="qual-item ${cls}">${icon}${c.label}</span>`;
  }).join("");
}
function chooseOpt(optJson, nodeId) {
  const opt = JSON.parse(optJson);
  if (nodeId === "new_prereq_order") qualStatus.order_api = opt.tag === "yes";
  if (nodeId === "new_prereq_fulfillment") qualStatus.fulfillment_api = opt.tag === "yes";
  if (["new_volume_check","new_volume_check_insights","new_ir_size_check","existing_ir_size_check"].includes(nodeId)) qualStatus.volume = opt.tag !== "no";
  if (nodeId === "new_ir_gmv_check") qualStatus.gmv = opt.tag === "yes";
  if (["new_ir_fraud_signal","existing_ir_fraud_check"].includes(nodeId)) qualStatus.fraud_signal = opt.tag === "yes";
  if (nodeId === "new_instant_portal") qualStatus.portal = opt.tag !== "c";
  history.push(current);
  current = opt.next;
  render();
}
const tagMap = { yes:"tag-yes", no:"tag-no", a:"tag-a", b:"tag-b", c:"tag-c", d:"tag-d", e:"tag-e" };
const tagLabel = { yes:"Yes", no:"No", a:"A", b:"B", c:"C", d:"D", e:"E" };
function render() {
  const node = nodes[current];
  if (!node) return;
  const prog = document.getElementById("progress");
  prog.innerHTML = history.map((h,i) => `<span class="crumb" onclick="goTo(${i})">${nodes[h]?.label||h}</span><span class="crumb-sep">›</span>`).join("") + `<span class="crumb active">${node.label||"outcome"}</span>`;
  renderQualBar();
  const content = document.getElementById("content");
  if (node.type === "outcome") {
    content.innerHTML = `
      <div class="outcome ${node.style}">
        <div class="outcome-label">Recommended action</div>
        <div class="outcome-title">${node.title}</div>
        <div class="outcome-body">${node.body}</div>
        <div class="owner-row">${(node.owners||[]).map(o=>`<span class="owner-chip">${o}</span>`).join("")}</div>
        ${node.placeholder?`<div class="placeholder-note">&#9888; ${node.placeholder}</div>`:""}
      </div>
      <div class="actions">
        ${history.length>0?`<button class="btn-back" onclick="goBack()">&#8592; Back</button>`:""}
        <button class="btn-restart" onclick="restart()">Start over</button>
      </div>`;
    return;
  }
  content.innerHTML = `
    <div class="question-card">
      ${node.stage?`<div class="q-stage">${node.stage}</div>`:""}
      <div class="q-label">${node.label||"Question"}</div>
      <div class="q-text">${node.q}</div>
      ${node.note?`<div class="q-note">${node.note}</div>`:""}
      <div class="options">
        ${node.opts.map(o=>`
          <button class="opt-btn" onclick="chooseOpt('${JSON.stringify(o).replace(/'/g,"&#39;").replace(/"/g,"&quot;")}','${node.id}')">
            <span class="opt-tag ${tagMap[o.tag]||'tag-a'}">${tagLabel[o.tag]||o.tag}</span>
            <span>${o.label}</span>
          </button>`).join("")}
      </div>
    </div>
    ${history.length>0?`<div class="actions"><button class="btn-back" onclick="goBack()">&#8592; Back</button></div>`:""}`;
}
function goBack() { if (history.length>0){current=history.pop();render();} }
function goTo(i) { current=history[i]; history=history.slice(0,i); render(); }
function restart() { history=[]; current="start"; Object.keys(qualStatus).forEach(k=>delete qualStatus[k]); render(); }
render();
</script>
